networks:
  wtraefik:
    external: true
    name: wtraefik

services:
  kop:
    image: ghcr.io/jittering/traefik-kop:latest
    container_name: kop
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      REDIS_ADDR: "10.9.0.58:6379"
      REDIS_PASS: "caravelle"
      BIND_IP: "10.9.0.206"
      DOCKER_CONFIG: |
        ---
        docker:
          defaultRule: "Host(`{{ index .Labels \"com.docker.compose.service\"}}.ggp006.fr`)"
          exposedByDefault: false
          watch: true
          network: "wtraefik"
    networks:
      - wtraefik

  portainer-agent:
    image: portainer/agent
    container_name: portainer-agent
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - 9001:9001

  tugtainer-agent:
    image: ghcr.io/quenary/tugtainer-agent:latest
    container_name: tugtainer-agent
    restart: unless-stopped
    ports:
      - 8001:8001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TUG_AGENT_SERVER=eze.home:8501
      - TUG_AGENT_SECRET=caravelle
      - TUG_AGENT_NAME=lax